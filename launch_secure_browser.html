<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch DigiAssess Exam</title>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: #f5f7fb;
        margin: 0;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        box-sizing: border-box;
        text-align: center;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        max-width: 420px;
        width: 90%;
      }

      h2 {
        margin-bottom: 10px;
        color: #222;
      }

      p {
        color: #666;
        font-size: 14px;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 20px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
      }

      .btn:hover {
        background: #1d4ed8;
      }

      .secondary {
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Launching Secure Browser...</h2>
      <p>
        Please wait while we open Secure Browser. If not opened, then click on
        the button below.
      </p>

      <a id="seb-launch-btn" class="btn" href="#"> Open Secure Browser </a>

      <a id="seb-download-btn" class="secondary" href="#"> Download Config </a>
    </div>

    <script>
      // ── SEB Configuration ─────────────────────────────────────
      // Use sebs:// — the HTTPS-equivalent SEB protocol scheme.
      // Cloud Run endpoints are HTTPS-only; seb:// maps to HTTP.
      var SEB_CONFIG_URL =
        "seb://drive.google.com/uc?export=download&id=1qw23gfNbBOn1eaHN_bZkZTNSdczKMQzv";

      // HTTPS variant for direct download fallback
      var SEB_CONFIG_DOWNLOAD_URL =
        "https://ats-prod-da-seb-config-183443062410.me-central2.run.app/seb-conf/SEBClientSettings_ATS.seb";
      // ─────────────────────────────────────────────────────────

      // ── Launch guard ───────────────────────────────────────────
      // Chrome on iPad clears sessionStorage during URL scheme
      // navigation and page reloads. Use localStorage with a
      // time-based cooldown instead — it persists across reloads,
      // back-navigation, and app switches.
      //
      // Cooldown period: 15 seconds. This prevents duplicate
      // invocations while still allowing the user to re-launch
      // after a reasonable wait if SEB didn't open.
      var STORAGE_KEY = "seb_launch_ts";
      var LAUNCH_COOLDOWN_MS = 15000;

      function launchSEB() {
        if (isInCooldown()) return false;
        try {
          localStorage.setItem(STORAGE_KEY, Date.now().toString());
        } catch (e) {
          // localStorage may be unavailable in some browsers
        }
        window.location.href = SEB_CONFIG_URL;
        return true;
      }

      function isInCooldown() {
        try {
          var lastLaunch = localStorage.getItem(STORAGE_KEY);
          if (!lastLaunch) return false;
          return (Date.now() - parseInt(lastLaunch, 10)) < LAUNCH_COOLDOWN_MS;
        } catch (e) {
          return false;
        }
      }

      // ── Platform detection ─────────────────────────────────────
      // On mobile/tablet (iPad, iPhone, Android), do NOT
      // auto-launch. The browser stays in the foreground during
      // URL scheme handoff and may reload the page, causing SEB
      // to receive the config multiple times.
      // On desktop (Windows, macOS), SEB takes over immediately
      // so auto-launch is safe.
      var isMobileOrTablet = /iPad|iPhone|iPod|Android/i.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      // ─────────────────────────────────────────────────────────

      // Wire up download link
      document.getElementById("seb-download-btn").href =
        SEB_CONFIG_DOWNLOAD_URL;

      // Wire up launch button
      var launchBtn = document.getElementById("seb-launch-btn");
      launchBtn.addEventListener("click", function (e) {
        e.preventDefault();
        // Clear cooldown for intentional user taps
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        launchSEB();
      });

      // Auto-launch only on desktop
      if (!isMobileOrTablet) {
        launchSEB();
      } else {
        // On mobile/tablet, update text to prompt the user to tap
        document.querySelector("h2").textContent = "Open Secure Browser";
        document.querySelector("p").textContent =
          "Tap the button below to launch Safe Exam Browser.";
      }
    </script>
  </body>
</html>
