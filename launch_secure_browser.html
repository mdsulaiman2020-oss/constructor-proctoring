<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch DigiAssess Exam</title>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: #f5f7fb;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        max-width: 420px;
        width: 90%;
      }

      h2 {
        margin-bottom: 10px;
        color: #222;
      }

      p {
        color: #666;
        font-size: 14px;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 20px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
      }

      .btn:hover {
        background: #1d4ed8;
      }

      .secondary {
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Launching Secure Browser...</h2>
      <p>
        Please wait while we open Secure Browser. If not opened, then click on
        the button below.
      </p>

      <a id="seb-launch-btn" class="btn" href="#"> Open Secure Browser </a>

      <a id="seb-download-btn" class="secondary" href="#"> Download Config </a>
    </div>

    <script>
      // ── SEB Configuration ─────────────────────────────────────
      // Use sebs:// — the HTTPS-equivalent SEB protocol scheme.
      // Cloud Run endpoints are HTTPS-only; seb:// maps to HTTP.
      const SEB_CONFIG_URL =
        "sebs://ats-prod-da-seb-config-183443062410.me-central2.run.app/seb-conf/SEBClientSettings_ATS.seb";

      // HTTPS variant for direct download fallback
      const SEB_CONFIG_DOWNLOAD_URL =
        "https://ats-prod-da-seb-config-183443062410.me-central2.run.app/seb-conf/SEBClientSettings_ATS.seb";
      // ─────────────────────────────────────────────────────────

      // ── Launch guard ───────────────────────────────────────────
      // On iPad Safari, after handing off to SEB via the URL
      // scheme, Safari reloads this page. The auto-launch then
      // fires AGAIN, sending the config to SEB a second time.
      // SEB rejects it with "Loading New Settings not allowed".
      //
      // We use sessionStorage to ensure the auto-launch only
      // fires once. sessionStorage is scoped to the tab and
      // cleared when the tab is closed, so opening a new tab
      // will still auto-launch.
      var STORAGE_KEY = "seb_launch_attempted";

      function launchSEB() {
        sessionStorage.setItem(STORAGE_KEY, Date.now().toString());
        window.location.href = SEB_CONFIG_URL;
      }

      function hasAlreadyLaunched() {
        return sessionStorage.getItem(STORAGE_KEY) !== null;
      }

      // Wire up download link
      document.getElementById("seb-download-btn").href =
        SEB_CONFIG_DOWNLOAD_URL;

      // Wire up launch button — always allows manual retry by
      // clearing the guard first
      var launchBtn = document.getElementById("seb-launch-btn");
      launchBtn.addEventListener("click", function (e) {
        e.preventDefault();
        sessionStorage.removeItem(STORAGE_KEY);
        launchSEB();
      });

      // Auto-launch ONLY if we haven't already tried in this tab.
      // This prevents the duplicate invocation on iPad Safari
      // page reloads after URL scheme handoff.
      if (!hasAlreadyLaunched()) {
        launchSEB();
      }
    </script>
  </body>
</html>
