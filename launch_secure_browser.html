<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch DigiAssess Exam</title>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: #f5f7fb;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        max-width: 420px;
        width: 90%;
      }

      h2 {
        margin-bottom: 10px;
        color: #222;
      }

      p {
        color: #666;
        font-size: 14px;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 20px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
      }

      .btn:hover {
        background: #1d4ed8;
      }

      .secondary {
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #2563eb;
      }

      .warning {
        margin-top: 15px;
        color: #d97706;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Launching Secure Browser...</h2>
      <p>
        Please wait while we open Secure Browser. If not opened, then click on
        the button below.
      </p>

      <a id="seb-launch-btn" class="btn" href="#"> Open Secure Browser </a>

      <a id="seb-download-btn" class="secondary" href="#"> Download Config </a>

      <div id="warning" class="warning" style="display: none">
        Secure Browser not detected. Please install it first.
      </div>
    </div>

    <script>
      // ── SEB Configuration ─────────────────────────────────────
      // Single source of truth for the SEB config URL.
      const SEB_CONFIG_URL =
        "seb://ats-prod-da-seb-config-183443062410.me-central2.run.app/seb-conf/SEBClientSettings_ATS.seb";

      // HTTPS variant for direct download fallback
      const SEB_CONFIG_DOWNLOAD_URL =
        "https://ats-prod-da-seb-config-183443062410.me-central2.run.app/seb-conf/SEBClientSettings_ATS.seb";
      // ─────────────────────────────────────────────────────────

      // Wire up download link (HTTPS, not seb://)
      document.getElementById("seb-download-btn").href =
        SEB_CONFIG_DOWNLOAD_URL;

      // Button click → launch SEB
      document.getElementById("seb-launch-btn").addEventListener("click", (e) => {
        e.preventDefault();
        window.location.href = SEB_CONFIG_URL;
      });

      // Show warning after delay if the page is still visible (SEB didn't take over)
      setTimeout(() => {
        if (!document.hidden) {
          document.getElementById("warning").style.display = "block";
        }
      }, 4000);
    </script>
  </body>
</html>
